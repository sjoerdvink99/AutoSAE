name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v2

      - name: Build autosae
        run: uv build --package autosae

      - name: Publish
        run: uv publish --trusted-publishing always
