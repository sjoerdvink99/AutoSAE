[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autosae"
version = "0.1.0"
description = "Activation steering for LLMs via control vectors — no prompt engineering required"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
keywords = ["llm", "activation-steering", "sparse-autoencoder", "control-vectors", "interpretability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "torch>=2.3",
    "transformers>=4.44",
    "safetensors>=0.4",
    "pydantic>=2.7",
    "huggingface-hub>=0.23",
    "accelerate>=0.30",
]

[project.optional-dependencies]
quantized = ["bitsandbytes>=0.43"]

[tool.hatch.build.targets.wheel]
packages = ["src/autosae"]
